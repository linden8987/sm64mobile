name: Build sm64mobile

on:
  push:
    branches: [ "main", "trunk" ]
  workflow_dispatch:

jobs:
  build-mobile:
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    runs-on: ${{ (matrix.platform == 'ios') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout sm64mobile
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies (Android/Linux)
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libusb-1.0-0-dev libsdl2-dev python3 wget zip binutils-mips-linux-gnu

      - name: Install Dependencies (iOS/macOS)
        if: matrix.platform == 'ios'
        run: |
          # The fix: Tap into n64tools to get the correct MIPS binutils
          brew tap n64tools/n64tools
          brew install mips64-elf-binutils sdl2 pkg-config python@3.11

      - name: Build for Android
        if: matrix.platform == 'android'
        run: |
          # Ensuring arm64 targets for modern hardware
          make TARGET_ANDROID=1 ARCH=arm64 CROSS_COMPILE=mips-linux-gnu- -j$(nproc)
          
      - name: Build for iOS
        if: matrix.platform == 'ios'
        run: |
          # Targeting the M1 architecture detected in your logs
          make TARGET_IOS=1 ARCH=arm64 CROSS_COMPILE=mips64-elf- -j$(sysctl -n hw.ncpu)

      - name: Stage Production Artifacts
        run: |
          mkdir -p staged_output
          # Collecting binaries while ignoring source code
          find build/ -type f \( -name "*.apk" -o -name "*.ipa" -o -name "sm64*" \) -exec cp {} staged_output/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sm64-${{ matrix.platform }}
          path: staged_output/

  publish-release:
    needs: build-mobile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sm64-*
          merge-multiple: true
          path: release-assets

      - name: Create sm64mobile Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "production"
          prerelease: false
          title: "sm64mobile"
          files: |
            release-assets/*
